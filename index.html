<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassManager Omni V5 - Ultra Blindado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Loader */
        #loader { transition: opacity 0.3s ease; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.2); border-radius: 50%; border-top: 4px solid white; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Animations */
        .toast-enter { transform: translateY(-20px); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        
        /* Calendar */
        .cal-day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.75rem; transition: all 0.2s; }
        .cal-day:hover { background-color: #e2e8f0; }
        .cal-selected { background-color: #2563eb !important; color: white !important; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4); }
        .cal-today { border: 2px solid #2563eb; color: #2563eb; }

        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-10">

    <!-- Loader Overlay -->
    <div id="loader" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <p class="text-white font-bold tracking-widest text-sm uppercase" id="loaderText">Sincronizando...</p>
    </div>

    <!-- Toast Messages -->
    <div id="toastContainer" class="fixed top-6 right-6 z-[110] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Top Navigation -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">ClassManager <span class="text-blue-600">Omni V5</span></h1>
            </div>
            
            <div id="syncStatus" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-100 border border-slate-200 text-[10px] font-bold uppercase tracking-wider text-slate-500">
                <div class="w-2 h-2 rounded-full bg-slate-300" id="syncDot"></div>
                <span id="syncText">Offline</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto w-full px-4 py-8 space-y-6">

        <!-- CONFIGURATION CARD -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6">
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-grow w-full">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Configuração do Motor (Web App URL)</label>
                        <div class="relative group">
                            <i data-lucide="link-2" class="w-4 h-4 absolute left-3 top-3 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                            <input type="password" id="apiUrl" onchange="salvarURLLocal()" placeholder="Cole aqui o URL do seu script implantado..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-medium">
                        </div>
                    </div>
                    <button onclick="conectarSistema()" class="w-full md:w-auto px-8 py-2.5 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 active:scale-95">
                        <i data-lucide="zap" class="w-4 h-4"></i> Conectar
                    </button>
                </div>

                <!-- SELECTORS -->
                <div id="contextArea" class="hidden mt-8 pt-8 border-t border-slate-100 grid grid-cols-1 md:grid-cols-12 gap-8">
                    <div class="md:col-span-7 space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Turma Ativa</label>
                            <div class="relative">
                                <select id="selectTurma" onchange="selecionarTurma()" class="w-full px-4 py-3 bg-white border-2 border-slate-200 rounded-xl appearance-none focus:border-blue-500 outline-none font-bold text-slate-800 shadow-sm transition-all cursor-pointer">
                                    <option value="">A carregar turmas...</option>
                                </select>
                                <i data-lucide="chevron-down" class="w-5 h-5 absolute right-4 top-3.5 text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                        
                        <div class="p-4 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-700 text-white shadow-lg shadow-blue-200 relative overflow-hidden group">
                            <i data-lucide="check-circle" class="w-20 h-20 absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform"></i>
                            <div class="relative z-10">
                                <h4 class="font-extrabold flex items-center gap-2 mb-1"><i data-lucide="shield-check" class="w-5 h-5"></i> Modo Auto-Save</h4>
                                <p class="text-[11px] font-medium opacity-90 leading-relaxed">
                                    O sistema salva automaticamente na planilha e no Drive após 2 segundos sem digitação. Sem stress.
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- MINI CALENDAR -->
                    <div class="md:col-span-5 bg-slate-50 border border-slate-200 rounded-2xl p-4 shadow-inner">
                        <div class="flex justify-between items-center mb-4">
                            <button onclick="navegarMes(-1)" class="p-1.5 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 transition-all"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <span id="labelMes" class="text-[10px] font-black uppercase tracking-widest text-slate-500">Mês Ano</span>
                            <button onclick="navegarMes(1)" class="p-1.5 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 transition-all"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                        </div>
                        <div class="grid grid-cols-7 gap-1 text-center text-[9px] font-black text-slate-400 mb-2 uppercase">
                            <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                        </div>
                        <div id="gridCalendario" class="grid grid-cols-7 gap-1"></div>
                        <input type="hidden" id="inputData">
                    </div>
                </div>
            </div>
        </section>

        <!-- WORKSPACE -->
        <div id="workspaceArea" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px]">
            <!-- TABS -->
            <div class="flex px-6 pt-2 bg-slate-50 border-b border-slate-200">
                <button onclick="abaAtiva('tab-daily')" id="btn-tab-daily" class="px-6 py-4 text-xs font-bold uppercase tracking-wider tab-active flex items-center gap-2 transition-all">
                    <i data-lucide="calendar-days" class="w-4 h-4"></i> Diário de Aula
                </button>
                <button onclick="abaAtiva('tab-reports')" id="btn-tab-reports" class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400 border-b-3 border-transparent flex items-center gap-2 transition-all">
                    <i data-lucide="medal" class="w-4 h-4"></i> Report Cards
                </button>
            </div>

            <!-- TAB: DAILY -->
            <div id="tab-daily" class="p-6 space-y-10">
                <div class="space-y-4">
                    <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-tighter">1. Presença e Avaliação Individual</h3>
                    </div>
                    <div id="listaAlunosDiario" class="space-y-3"></div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-tighter border-b border-slate-100 pb-2">2. Resumo da Aula</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Conteúdo</label><textarea id="dr-conteudo" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></textarea></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Atividades</label><textarea id="dr-atividades" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></textarea></div>
                        </div>
                        <div class="space-y-4">
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Dificuldades</label><textarea id="dr-dificuldades" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></textarea></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Próxima Aula</label><textarea id="dr-proxima" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></textarea></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <input type="text" id="dr-teacher" placeholder="Teacher" class="p-3 bg-slate-50 border rounded-xl text-sm">
                        <input type="text" id="dr-ateOnde" placeholder="Ate onde foi..." class="p-3 bg-slate-50 border rounded-xl text-sm">
                    </div>
                </div>

                <div class="pt-8 flex justify-between items-center">
                    <div id="boxAttendanceStrings" class="hidden flex gap-4 text-[10px] font-bold text-slate-400">
                        <span id="strPres">PRES: -</span>
                        <span id="strAbs">FALT: -</span>
                    </div>
                    <div class="flex gap-4">
                        <a id="btnLinkDocs" href="#" target="_blank" class="hidden text-blue-600 font-bold text-xs">Ver Docs</a>
                        <button onclick="forcarSalvamento()" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-2xl">Salvar</button>
                    </div>
                </div>
            </div>

            <!-- TAB: REPORTS -->
            <div id="tab-reports" class="hidden p-6 space-y-6">
                <div class="grid grid-cols-4 gap-4">
                    <input type="text" id="rcMonth" placeholder="Mês" class="p-2 border rounded text-sm">
                    <input type="text" id="rcLevel" placeholder="Nível" class="p-2 border rounded text-sm">
                    <input type="text" id="rcFreq" placeholder="Freq" class="p-2 border rounded text-sm">
                    <input type="text" id="rcType" placeholder="Tipo" class="p-2 border rounded text-sm">
                </div>
                <div id="listaAlunosRC" class="space-y-6"></div>
                <div class="flex justify-end gap-4">
                    <a id="btnDocCards" href="#" target="_blank" class="hidden text-green-600 font-bold text-xs">Cards</a>
                    <button onclick="gerarReportCards()" class="px-8 py-3 bg-green-600 text-white font-bold rounded-2xl">Gerar</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const state = { alunos: [], presencas: [], navDate: new Date(), selectedDateStr: "", isReady: false, isSaving: false, docUrl: "" };
        let autoSaveTimeout = null;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const saved = localStorage.getItem('omniV5_apiUrl');
            if (saved) document.getElementById('apiUrl').value = saved;
            const hoje = new Date();
            state.selectedDateStr = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
            document.getElementById('inputData').value = state.selectedDateStr;
            renderizarCalendario();
            document.getElementById('tab-daily').addEventListener('input', () => { if (state.isReady) gatilhoAutoSave(); });
        });

        async function callAPI(payload) {
            const url = document.getElementById('apiUrl').value.trim();
            try {
                const response = await fetch(url, { method: 'POST', redirect: 'follow', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
                const data = await response.json();
                if (data.status === "Erro") throw new Error(data.mensagem);
                return data;
            } catch (err) {
                showToast("Erro", err.message, "error");
                throw err;
            }
        }

        function gatilhoAutoSave() {
            setStatusSincronizando();
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => { salvarDadosDiario(true); }, 2500);
        }

        function setStatusSincronizando() {
            const txt = document.getElementById('syncText');
            txt.innerText = "Sincronizando...";
            document.getElementById('syncDot').className = "w-2 h-2 rounded-full bg-amber-400 animate-pulse";
        }

        function setStatusSincronizado(sucesso = true) {
            const txt = document.getElementById('syncText');
            txt.innerText = sucesso ? "Sincronizado" : "Erro";
            document.getElementById('syncDot').className = "w-2 h-2 rounded-full " + (sucesso ? "bg-green-500" : "bg-red-500");
        }

        function showToast(title, msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-enter p-4 min-w-[320px] bg-white border-l-4 rounded-xl shadow-xl flex items-start gap-3 pointer-events-auto transition-all ${type === 'success' ? 'border-green-500' : 'border-red-500'}`;
            toast.innerHTML = `<div><h4 class="font-black text-xs uppercase">${title}</h4><p class="text-xs mt-1">${msg}</p></div>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('toast-active'));
            setTimeout(() => { toast.classList.remove('toast-active'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function toggleLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }

        function abaAtiva(id) {
            document.getElementById('tab-daily').classList.add('hidden');
            document.getElementById('tab-reports').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-tab-daily').classList.toggle('tab-active', id==='tab-daily');
            document.getElementById('btn-tab-reports').classList.toggle('tab-active', id==='tab-reports');
        }

        function renderizarCalendario() {
            const y = state.navDate.getFullYear(), m = state.navDate.getMonth();
            const first = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate();
            document.getElementById('labelMes').innerText = new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(state.navDate);
            const grid = document.getElementById('gridCalendario');
            grid.innerHTML = '';
            for (let i = 0; i < first; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= total; d++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                grid.innerHTML += `<div onclick="selecionarData('${ds}')" class="cal-day ${ds === state.selectedDateStr ? 'cal-selected' : ''}">${d}</div>`;
            }
        }

        function navegarMes(v) { state.navDate.setMonth(state.navDate.getMonth() + v); renderizarCalendario(); }
        function selecionarData(str) { state.selectedDateStr = str; document.getElementById('inputData').value = str; renderizarCalendario(); buscarDadosData(); }

        function salvarURLLocal() { localStorage.setItem('omniV5_apiUrl', document.getElementById('apiUrl').value.trim()); }

        async function conectarSistema() {
            toggleLoader(true);
            try {
                const res = await callAPI({ acao: "buscar_abas" });
                const sel = document.getElementById('selectTurma');
                sel.innerHTML = '<option value="">Turma...</option>';
                res.abas.forEach(a => sel.innerHTML += `<option value="${a}">${a}</option>`);
                document.getElementById('contextArea').classList.remove('hidden');
            } finally { toggleLoader(false); }
        }

        async function selecionarTurma() {
            const t = document.getElementById('selectTurma').value;
            if (!t) return;
            toggleLoader(true);
            try {
                const res = await callAPI({ acao: "buscar_alunos", turma: t });
                state.alunos = res.alunos || [];
                state.presencas = state.alunos.map(() => 'P');
                gerarInterfaceAlunos();
                document.getElementById('workspaceArea').classList.remove('hidden');
                buscarDadosData();
            } finally { toggleLoader(false); }
        }

        function gerarInterfaceAlunos() {
            const d = document.getElementById('listaAlunosDiario'), r = document.getElementById('listaAlunosRC');
            d.innerHTML = ''; r.innerHTML = '';
            state.alunos.forEach((n, i) => {
                d.innerHTML += `<div class="p-3 bg-white border rounded-2xl flex items-center gap-4">
                    <span class="text-xs font-bold w-1/3">${n}</span>
                    <button onclick="setPresenca(${i},'P')" id="btn-p-${i}" class="px-4 py-1.5 rounded bg-green-500 text-white text-[10px]">P</button>
                    <button onclick="setPresenca(${i},'F')" id="btn-f-${i}" class="px-4 py-1.5 rounded text-slate-400 text-[10px]">F</button>
                    <input id="dr-dif-${i}" class="flex-grow p-2 border rounded-xl text-xs" placeholder="Dif.">
                    <input id="dr-elo-${i}" class="flex-grow p-2 border rounded-xl text-xs" placeholder="Elo.">
                </div>`;
                r.innerHTML += `<div class="p-4 bg-slate-50 border rounded-2xl"><h4 class="font-black text-xs">${n}</h4><div class="grid grid-cols-4 gap-2 mt-2">${['spk','lis','rea','wri','gra','voc','par','pre'].map(k=>`<input id="rc-${k}-${i}" placeholder="${k}" class="p-1 border text-xs">`).join('')}</div><textarea id="rc-com-${i}" class="w-full mt-2 text-xs h-10 p-2"></textarea></div>`;
            });
            state.isReady = true;
        }

        function setPresenca(i, s) {
            state.presencas[i] = s;
            document.getElementById(`btn-p-${i}`).className = s==='P' ? "px-4 py-1.5 rounded bg-green-500 text-white text-[10px]" : "px-4 py-1.5 rounded text-slate-400 text-[10px]";
            document.getElementById(`btn-f-${i}`).className = s==='F' ? "px-4 py-1.5 rounded bg-red-500 text-white text-[10px]" : "px-4 py-1.5 rounded text-slate-400 text-[10px]";
            atualizarStringsPresenca();
            gatilhoAutoSave();
        }

        function atualizarStringsPresenca() {
            const p = state.alunos.filter((n,i)=>state.presencas[i]==='P'), a = state.alunos.filter((n,i)=>state.presencas[i]==='F');
            document.getElementById('strPres').innerText = "PRES: " + p.join(', ');
            document.getElementById('strAbs').innerText = "FALT: " + a.join(', ');
            document.getElementById('boxAttendanceStrings').classList.remove('hidden');
        }

        async function buscarDadosData() {
            const t = document.getElementById('selectTurma').value, d = document.getElementById('inputData').value;
            if (!t || !d) return;
            state.isReady = false;
            toggleLoader(true);
            try {
                const parts = d.split('-');
                const res = await callAPI({ acao: "buscar_dados", turma: t, data: `${parts[2]}/${parts[1]}/${parts[0]}` });
                if (res.status === "Sucesso" && res.dados) {
                    const g = res.dados;
                    document.getElementById('dr-teacher').value = g.teacher || "";
                    document.getElementById('dr-conteudo').value = g.lessonPlan || "";
                    document.getElementById('dr-atividades').value = g.extraActivity || "";
                    document.getElementById('dr-proxima').value = g.objectives || "";
                    const absArr = (g.absence || "").toLowerCase().split(',').map(s=>s.trim());
                    state.alunos.forEach((n,i)=>setPresenca(i, absArr.includes(n.toLowerCase()) ? 'F' : 'P'));
                }
            } finally { toggleLoader(false); state.isReady = true; }
        }

        async function salvarDadosDiario(isAuto = false) {
            if (state.isSaving) return;
            state.isSaving = true;
            const t = document.getElementById('selectTurma').value, d = document.getElementById('inputData').value;
            const parts = d.split('-');
            try {
                const res = await callAPI({
                    acao: "salvar_tudo", turma: t, data: `${parts[2]}/${parts[1]}/${parts[0]}`,
                    attendance: state.alunos.filter((n,i)=>state.presencas[i]==='P').join(', '),
                    absence: state.alunos.filter((n,i)=>state.presencas[i]==='F').join(', '),
                    teacher: document.getElementById('dr-teacher').value,
                    report: {
                        conteudo: document.getElementById('dr-conteudo').value,
                        atividades: document.getElementById('dr-atividades').value,
                        proximaAula: document.getElementById('dr-proxima').value,
                        dificuldadesGerais: document.getElementById('dr-dificuldades').value
                    },
                    alunos: state.alunos.map((n,i)=>({ nome:n, dificuldade: document.getElementById(`dr-dif-${i}`).value, elogio: document.getElementById(`dr-elo-${i}`).value }))
                });
                if (res.docUrl) { state.docUrl = res.docUrl; document.getElementById('btnLinkDocs').href = res.docUrl; document.getElementById('btnLinkDocs').classList.remove('hidden'); }
                setStatusSincronizado(true);
            } catch(e) { setStatusSincronizado(false); }
            finally { state.isSaving = false; autoSaveTimeout = null; }
        }

        function forcarSalvamento() { salvarDadosDiario(false); }

        async function gerarReportCards() {
            toggleLoader(true);
            try {
                const res = await callAPI({
                    acao: "gerar_report_cards", turma: document.getElementById('selectTurma').value, mes: document.getElementById('rcMonth').value,
                    teacher: document.getElementById('dr-teacher').value, level: document.getElementById('rcLevel').value,
                    classType: document.getElementById('rcType').value, frequency: document.getElementById('rcFreq').value,
                    alunos: state.alunos.map((n,i)=>({
                        nome:n, speaking: document.getElementById(`rc-spk-${i}`).value, listening: document.getElementById(`rc-lis-${i}`).value,
                        reading: document.getElementById(`rc-rea-${i}`).value, writing: document.getElementById(`rc-wri-${i}`).value,
                        grammar: document.getElementById(`rc-gra-${i}`).value, vocabulary: document.getElementById(`rc-voc-${i}`).value,
                        participation: document.getElementById(`rc-par-${i}`).value, preparation: document.getElementById(`rc-pre-${i}`).value,
                        comment: document.getElementById(`rc-com-${i}`).value
                    }))
                });
                if (res.url) { document.getElementById('btnDocCards').href = res.url; document.getElementById('btnDocCards').classList.remove('hidden'); }
            } finally { toggleLoader(false); }
        }
    </script>
</body>
</html>
